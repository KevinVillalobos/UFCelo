services:
  backend:
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - KV_REST_API_URL=${KV_REST_API_URL:-}
      - KV_REST_API_TOKEN=${KV_REST_API_TOKEN:-}
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
