<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predict — UFCelo.gg</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<main class="container">
  <div class="page-header">
    <h1>Fight Prediction</h1>
    <p>Blended ELO + skill composite for win probability.</p>
  </div>

  <!-- Section 1: Fighter selectors -->
  <div class="form-row">
    <div class="form-group" style="max-width:240px;">
      <label>Division</label>
      <select id="div-sel"></select>
    </div>
    <div class="form-group">
      <label>Fighter A</label>
      <select id="fa-sel"></select>
    </div>
    <div class="form-group">
      <label>Fighter B</label>
      <select id="fb-sel"></select>
    </div>
  </div>

  <!-- Section 2: Probability bar + result summary -->
  <div id="prob-section"></div>

  <!-- Section 3: Fighter cards -->
  <div id="cards-section"></div>

  <!-- Section 3b: Physical silhouettes -->
  <div id="sil-section"></div>

  <!-- Section 4: Skill comparison -->
  <div id="skill-section"></div>

  <!-- Section 5: Fight stats comparison -->
  <div id="stats-section"></div>

  <!-- Section 6: ELO simulator -->
  <div id="simulator-section"></div>

  <!-- Section 7: How it works -->
  <div id="how-it-works"></div>
</main>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="/app.js"></script>
<script>
const SKILL_DIMS   = ['Striking','Grappling','Defensa','Consistencia','Finish Rate','Cardio/Durabilidad','Presión'];
const SKILL_LABELS = ['Striking','Grappling','Defense','Consistency','Finish Rate','Cardio / Durability','Pressure'];
const SKILL_MAP    = Object.fromEntries(SKILL_DIMS.map((d, i) => [d, SKILL_LABELS[i]]));
const COLOR_A = '#E8281E';
const COLOR_B = '#378ADD';

// ── ELO Simulator helpers (exact port of Python elo_engine) ─────────────────
const METHOD_WIN_WEIGHTS = {
  'KO/TKO': {1:1.40, 2:1.25, 3:1.10, 4:1.10, 5:1.10},
  'SUB':    {1:1.25, 2:1.25, 3:1.10, 4:1.10, 5:1.10},
  'DEC U':  {3:1.05, 5:1.05},
  'DEC M':  {3:0.90, 5:0.90},
  'DEC S':  {3:0.80, 5:0.80},
};
const METHOD_LOSS_WEIGHTS = {
  'KO/TKO': {1:1.40, 2:1.25, 3:1.10, 4:1.10, 5:1.10},
  'SUB':    {1:1.20, 2:1.20, 3:1.20, 4:1.20, 5:1.20},
  'DEC U':  {3:1.05, 5:1.05},
  'DEC M':  {3:0.90, 5:0.90},
  'DEC S':  {3:0.80, 5:0.80},
};

function fightWeight(method, isTitle, rnd) {
  const w = (METHOD_WIN_WEIGHTS[method] || {})[rnd] ?? 1.0;
  return isTitle ? w * 1.20 : w;
}
function lossWeight(method, isTitle, rnd, wasFavorite) {
  const w = (METHOD_LOSS_WEIGHTS[method] || {})[rnd] ?? 1.0;
  return (isTitle && wasFavorite) ? w * 1.20 : w;
}
function clm(streak) {
  const consec = Math.max(0, -streak) + 1;
  if (consec >= 5) return 1.80;
  if (consec >= 4) return 1.60;
  if (consec >= 3) return 1.40;
  if (consec >= 2) return 1.20;
  return 1.00;
}
function simScenario(sim, winner, method, rnd, isTitle) {
  const eloA = sim.elo_a, eloB = sim.elo_b;
  const expA = 1.0 / (1.0 + Math.pow(10, (eloB - eloA) / 400));
  const expB = 1.0 - expA;

  let eloW, eloL, kvarW, kvarL, smW, smL, streakL, expW, expL, favL;
  if (winner === 'a') {
    eloW    = eloA;     eloL    = eloB;
    kvarW   = sim.k_var_a;    kvarL   = sim.k_var_b;
    smW     = sim.streak_mult_a;  smL     = sim.streak_mult_b;
    streakL = sim.streak_b;
    expW    = expA;     expL    = expB;
    favL    = eloB >= eloA;
  } else {
    eloW    = eloB;     eloL    = eloA;
    kvarW   = sim.k_var_b;    kvarL   = sim.k_var_a;
    smW     = sim.streak_mult_b;  smL     = sim.streak_mult_a;
    streakL = sim.streak_a;
    expW    = expB;     expL    = expA;
    favL    = eloA >= eloB;
  }

  const fw = fightWeight(method, isTitle, rnd);
  const lw = lossWeight(method, isTitle, rnd, favL);
  const cm = clm(streakL);

  const kW = sim.k_base * fw * smW * kvarW;
  const kL = sim.k_base * lw * cm * smL * kvarL;

  let dw = kW * (1.0 - expW);
  let dl = kL * (0.0 - expL);

  if (eloL < 1300 && dw > 8.0) dw = 8.0;
  dw = Math.max(dw, 1.0);
  dl = Math.max(-80.0, Math.min(dl, -1.0));

  return {
    delta_winner:      +dw.toFixed(1),
    delta_loser:       +dl.toFixed(1),
    k_winner:          +kW.toFixed(2),
    k_loser:           +kL.toFixed(2),
    elo_winner_before: +eloW.toFixed(1),
    elo_loser_before:  +eloL.toFixed(1),
    elo_winner_after:  +Math.max(1000, eloW + dw).toFixed(1),
    elo_loser_after:   +Math.max(1000, eloL + dl).toFixed(1),
    expected_winner:   +expW.toFixed(4),
    fight_weight:      +fw.toFixed(4),
    loss_weight:       +lw.toFixed(4),
    consec_loss_mult:  +cm.toFixed(2),
  };
}

// ── Main ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const divSel = document.getElementById('div-sel');
  const faSel  = document.getElementById('fa-sel');
  const fbSel  = document.getElementById('fb-sel');
  let rankingsCache = {};
  let simData = null;

  populateDivSelect(divSel);

  async function loadDiv() {
    const div = divSel.value;
    if (!rankingsCache[div]) {
      try { rankingsCache[div] = await apiFetch(`/rankings/${divSlug(div)}`); }
      catch(e) { rankingsCache[div] = []; }
    }
    populateFighterSelect(faSel, rankingsCache[div]);
    populateFighterSelect(fbSel, rankingsCache[div]);
    if (fbSel.options.length > 1) fbSel.selectedIndex = 1;
    await predict();
  }

  function clearAll() {
    ['prob-section','cards-section','sil-section','skill-section','stats-section','simulator-section','how-it-works']
      .forEach(id => { document.getElementById(id).innerHTML = ''; });
  }

  async function predict() {
    const fa  = faSel.value;
    const fb  = fbSel.value;
    const div = divSel.value;
    if (!fa || !fb || fa === fb) { clearAll(); return; }

    // Show loading state
    document.getElementById('prob-section').innerHTML =
      '<div class="loading" style="margin-bottom:1rem;">Loading prediction…</div>';

    // Step 1: load prediction (required — blocks nothing else, just the prob bar)
    let pred;
    try {
      pred = await apiFetch(`/predict?fighter_a=${fa}&fighter_b=${fb}&division=${divSlug(div)}`);
    } catch(e) {
      document.getElementById('prob-section').innerHTML =
        `<div class="alert-error">Prediction unavailable: ${e.message}</div>`;
      ['cards-section','skill-section','stats-section','simulator-section','how-it-works']
        .forEach(id => { document.getElementById(id).innerHTML = ''; });
      return;
    }

    const rankings = rankingsCache[div] || [];
    const rankA    = rankings.find(f => f.fighter_id === fa);
    const rankB    = rankings.find(f => f.fighter_id === fb);
    const faName   = rankA?.fighter_name ?? pred.fighter_a_name ?? fa;
    const fbName   = rankB?.fighter_name ?? pred.fighter_b_name ?? fb;
    const eloA     = rankA?.elo ?? 0;
    const eloB     = rankB?.elo ?? 0;

    // Render prob bar + summary immediately
    try { renderProbSection(pred, faName, fbName); } catch(e) { console.error('prob section:', e); }
    try { renderCardsSection(pred, faName, fbName, eloA, eloB); } catch(e) { console.error('cards:', e); }

    // Step 2: load profiles + simulator in parallel; each section renders independently
    const [profARes, profBRes, simRes] = await Promise.allSettled([
      apiFetch(`/fighter/${fa}?division=${divSlug(div)}`),
      apiFetch(`/fighter/${fb}?division=${divSlug(div)}`),
      apiFetch(`/simulator-data?fighter_a=${fa}&fighter_b=${fb}&division=${divSlug(div)}`),
    ]);

    const profA = profARes.status === 'fulfilled' ? profARes.value : null;
    const profB = profBRes.status === 'fulfilled' ? profBRes.value : null;
    simData     = simRes.status  === 'fulfilled' ? simRes.value  : null;

    try { renderSilhouetteSection(profA, profB, faName, fbName); } catch(e) { console.error('sil:', e); }
    try { renderSkillSection(pred, faName, fbName); }              catch(e) { console.error('skill:', e); }
    try { renderStatsSection(profA, profB, faName, fbName); }      catch(e) { console.error('stats:', e); }
    try { renderSimulatorSection(faName, fbName); }                catch(e) { console.error('sim:', e); }
    try { renderHowItWorks(); }                                    catch(e) { console.error('how:', e); }
  }

  // ── Silhouette SVG (ported from frontend/silhouette.py) ─────────────────────
  function makeFigureSVG(cx, feetY, H, R, color, name) {
    const fill  = color + '28';
    const sw    = Math.max(1.2, H * 0.007);
    const hr    = H * 0.075;
    const hcy   = feetY - H + hr;
    const shY   = feetY - H * 0.860,  shX  = H * 0.115;
    const wstY  = feetY - H * 0.470,  wstX = H * 0.078;
    const hipY  = feetY - H * 0.400,  hipX = H * 0.095;
    const knY   = feetY - H * 0.240,  knX  = H * 0.070;
    const anY   = feetY - H * 0.055,  anX  = H * 0.054;
    const ftX   = H * 0.088;
    const armH  = R / 2;
    const f = n => n.toFixed(1);
    const path = [
      `M ${f(cx)},${f(shY)}`,
      `L ${f(cx-shX)},${f(shY)}`,
      `Q ${f(cx-shX*1.10)},${f(wstY)} ${f(cx-wstX)},${f(wstY)}`,
      `Q ${f(cx-hipX*1.05)},${f(hipY)} ${f(cx-hipX)},${f(hipY)}`,
      `L ${f(cx-knX)},${f(knY)} L ${f(cx-anX)},${f(anY)}`,
      `L ${f(cx-ftX)},${f(feetY)} L ${f(cx+ftX)},${f(feetY)}`,
      `L ${f(cx+anX)},${f(anY)} L ${f(cx+knX)},${f(knY)}`,
      `L ${f(cx+hipX)},${f(hipY)}`,
      `Q ${f(cx+hipX*1.05)},${f(hipY)} ${f(cx+wstX)},${f(wstY)}`,
      `Q ${f(cx+shX*1.10)},${f(wstY)} ${f(cx+shX)},${f(shY)} Z`,
    ].join(' ');
    const nw = H * 0.035;
    return [
      `<line x1="${f(cx)}" y1="${f(hcy+hr)}" x2="${f(cx)}" y2="${f(shY)}" stroke="${color}" stroke-width="${f(nw)}" stroke-linecap="round"/>`,
      `<circle cx="${f(cx)}" cy="${f(hcy)}" r="${f(hr)}" fill="${fill}" stroke="${color}" stroke-width="${f(sw)}"/>`,
      `<path d="${path}" fill="${fill}" stroke="${color}" stroke-width="${f(sw)}" stroke-linejoin="round"/>`,
      `<line x1="${f(cx-shX)}" y1="${f(shY)}" x2="${f(cx-armH)}" y2="${f(shY)}" stroke="${color}" stroke-width="${f(H*0.026)}" stroke-linecap="round"/>`,
      `<line x1="${f(cx+shX)}" y1="${f(shY)}" x2="${f(cx+armH)}" y2="${f(shY)}" stroke="${color}" stroke-width="${f(H*0.026)}" stroke-linecap="round"/>`,
      name ? `<text x="${f(cx)}" y="${f(feetY+18)}" text-anchor="middle" font-size="12" fill="${color}" font-family="sans-serif" font-weight="700">${name}</text>` : '',
    ].join('\n  ');
  }

  function fmtHt(inches) {
    if (!inches) return '??';
    return `${Math.floor(inches/12)}'${Math.round(inches%12)}"`;
  }

  function buildComparisonSVG(hA, rA, wA, nameA, hB, rB, wB, nameB) {
    const BODY_H = 240;
    const HA = hA || 70, HB = hB || 70;
    const RA = rA || HA, RB = rB || HB;
    const scale = BODY_H / Math.max(HA, HB);
    const HpxA = HA * scale, HpxB = HB * scale;
    const RpxA = RA * scale, RpxB = RB * scale;
    const padX = 16, padTop = 28, padBot = 56, gap = 48;
    const cxA = padX + RpxA / 2;
    const cxB = cxA + RpxA / 2 + gap + RpxB / 2;
    const svgW = cxB + RpxB / 2 + padX;
    const feetY = padTop + BODY_H;
    const svgH = feetY + padBot;
    const f = n => n.toFixed(1);

    const bodyA = makeFigureSVG(cxA, feetY, HpxA, RpxA, COLOR_A, nameA);
    const bodyB = makeFigureSVG(cxB, feetY, HpxB, RpxB, COLOR_B, nameB);

    const extras = [];
    // Height dashes
    extras.push(`<line x1="${f(cxA-RpxA*0.18)}" y1="${f(feetY-HpxA)}" x2="${f(cxA+RpxA*0.18)}" y2="${f(feetY-HpxA)}" stroke="${COLOR_A}" stroke-width="1" stroke-dasharray="4,3" opacity="0.55"/>`);
    extras.push(`<line x1="${f(cxB-RpxB*0.18)}" y1="${f(feetY-HpxB)}" x2="${f(cxB+RpxB*0.18)}" y2="${f(feetY-HpxB)}" stroke="${COLOR_B}" stroke-width="1" stroke-dasharray="4,3" opacity="0.55"/>`);
    // Height diff badge
    const hDiff = Math.abs(HA - HB);
    if (hDiff >= 0.5) {
      const taller = HA > HB ? nameA : nameB;
      const badgeColor = HA > HB ? COLOR_A : COLOR_B;
      const midX = (cxA + cxB) / 2;
      const badgeY = Math.min(feetY - HpxA, feetY - HpxB) - 6;
      extras.push(`<text x="${f(midX)}" y="${f(badgeY)}" text-anchor="middle" font-size="10" fill="${badgeColor}" font-family="sans-serif" font-weight="600">+${Math.round(hDiff)}" height (${taller})</text>`);
    }
    // Reach diff badge
    const rDiff = RA - RB;
    if (Math.abs(rDiff) >= 0.5) {
      const advName  = rDiff > 0 ? nameA : nameB;
      const advColor = rDiff > 0 ? COLOR_A : COLOR_B;
      const midX = (cxA + cxB) / 2;
      extras.push(`<text x="${f(midX)}" y="${f(feetY+36)}" text-anchor="middle" font-size="10" fill="${advColor}" font-family="sans-serif" font-weight="600">+${Math.abs(rDiff).toFixed(0)}" reach (${advName})</text>`);
    }
    // Measurements
    extras.push(`<text x="${f(cxA)}" y="${f(svgH-5)}" text-anchor="middle" font-size="9" fill="#777" font-family="monospace">${fmtHt(hA)} · ${RA.toFixed(0)}" reach${wA ? ' · '+wA+' lbs' : ''}</text>`);
    extras.push(`<text x="${f(cxB)}" y="${f(svgH-5)}" text-anchor="middle" font-size="9" fill="#777" font-family="monospace">${fmtHt(hB)} · ${RB.toFixed(0)}" reach${wB ? ' · '+wB+' lbs' : ''}</text>`);

    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${f(svgW)} ${f(svgH)}" width="100%" style="max-height:340px;display:block;">
  ${bodyA}
  ${bodyB}
  ${extras.join('\n  ')}
</svg>`;
  }

  function renderSilhouetteSection(profA, profB, faName, fbName) {
    const el = document.getElementById('sil-section');
    if (!profA && !profB) { el.innerHTML = ''; return; }
    const hA = profA?.height_inches, rA = profA?.reach_inches, wA = profA?.weight_lbs;
    const hB = profB?.height_inches, rB = profB?.reach_inches, wB = profB?.weight_lbs;
    if (!hA && !hB) { el.innerHTML = ''; return; }
    const svg = buildComparisonSVG(hA, rA, wA, faName, hB, rB, wB, fbName);
    el.innerHTML = `<div class="chart-box" style="margin-bottom:1rem;padding:1rem;">${svg}</div>`;
  }

  // ── Section 2: Probability bar + summary ───────────────────────────────────
  function renderProbSection(pred, faName, fbName) {
    const pa   = pred.probability_a;
    const pb   = pred.probability_b;
    const win  = pa >= pb ? faName : fbName;
    const winP = Math.max(pa, pb);
    const keyAdv = SKILL_MAP[pred.key_advantage] || pred.key_advantage || '—';

    document.getElementById('prob-section').innerHTML = `
      <div class="chart-box" style="margin-bottom:0.75rem;">
        <div id="prob-bar" style="height:120px;"></div>
      </div>
      <div class="alert-success" style="font-size:1rem;margin-bottom:0.75rem;">
        <strong>${win}</strong> wins with <strong>${(winP*100).toFixed(1)}%</strong> probability
        &mdash; predicted method: <strong>${pred.method_prediction || '—'}</strong>
      </div>
      <div class="metrics-row" style="margin-bottom:0.75rem;">
        <div class="metric">
          <div class="metric-label">Predicted winner</div>
          <div class="metric-value" style="font-size:1rem;">${win}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Win probability</div>
          <div class="metric-value">${(winP*100).toFixed(1)}%</div>
        </div>
        <div class="metric">
          <div class="metric-label">Predicted method</div>
          <div class="metric-value" style="font-size:1rem;">${pred.method_prediction || '—'}</div>
        </div>
        <div class="metric">
          <div class="metric-label">ELO edge (A&minus;B)</div>
          <div class="metric-value">${pred.elo_difference >= 0 ? '+' : ''}${pred.elo_difference != null ? pred.elo_difference.toFixed(0) : '—'}</div>
        </div>
      </div>
      <div style="color:var(--muted);font-size:0.85rem;margin-bottom:1.5rem;">
        Key advantage: <strong style="color:var(--text);">${keyAdv}</strong>
        &nbsp;&middot;&nbsp;
        Pure ELO prob: <strong style="color:var(--text);">${pred.elo_probability_a != null ? (pred.elo_probability_a*100).toFixed(1) : '—'}%</strong>
        &rarr; with skill: <strong style="color:var(--text);">${(pa*100).toFixed(1)}%</strong>
        &nbsp;&middot;&nbsp;
        Skill composite A: <strong style="color:${COLOR_A};">${pred.skill_composite_a != null ? pred.skill_composite_a.toFixed(1) : '—'}</strong>
        vs B: <strong style="color:${COLOR_B};">${pred.skill_composite_b != null ? pred.skill_composite_b.toFixed(1) : '—'}</strong>
      </div>`;

    Plotly.newPlot('prob-bar', [
      {
        type: 'bar', orientation: 'h',
        x: [pa * 100],
        y: [faName],
        marker: { color: COLOR_A },
        text: [`${(pa*100).toFixed(1)}%`],
        textposition: 'inside',
        textfont: { color: '#fff', size: 14, family: 'sans-serif' },
        name: faName,
      },
      {
        type: 'bar', orientation: 'h',
        x: [pb * 100],
        y: [fbName],
        marker: { color: COLOR_B },
        text: [`${(pb*100).toFixed(1)}%`],
        textposition: 'inside',
        textfont: { color: '#fff', size: 14, family: 'sans-serif' },
        name: fbName,
      },
    ], {
      ...PLOTLY_LAYOUT,
      barmode: 'stack',
      height: 110,
      xaxis: { range: [0, 100], showticklabels: false, showgrid: false },
      yaxis: { showgrid: false, tickfont: { size: 13 } },
      margin: { l: 10, r: 10, t: 8, b: 8 },
      showlegend: false,
    }, { displayModeBar: false, responsive: true });
  }

  // ── Section 3: Fighter cards ────────────────────────────────────────────────
  function renderCardsSection(pred, faName, fbName, eloA, eloB) {
    document.getElementById('cards-section').innerHTML = `
      <div class="grid-2" style="margin-bottom:1rem;">
        <div class="card">
          <div style="font-weight:700;font-size:1.05rem;margin-bottom:0.5rem;color:${COLOR_A};">${faName}</div>
          <div style="color:var(--muted);font-size:0.8rem;">ELO</div>
          <div style="font-size:1.3rem;font-weight:700;color:var(--red);">${eloA ? eloA.toFixed(1) : '—'}</div>
          <div style="margin-top:0.5rem;color:var(--muted);font-size:0.8rem;">Win probability</div>
          <div style="font-size:1.3rem;font-weight:700;color:${COLOR_A};">${(pred.probability_a*100).toFixed(1)}%</div>
          <div style="margin-top:0.5rem;color:var(--muted);font-size:0.8rem;">Skill composite</div>
          <div style="font-size:1.1rem;font-weight:700;">${pred.skill_composite_a != null ? pred.skill_composite_a.toFixed(1) : '—'}</div>
        </div>
        <div class="card">
          <div style="font-weight:700;font-size:1.05rem;margin-bottom:0.5rem;color:${COLOR_B};">${fbName}</div>
          <div style="color:var(--muted);font-size:0.8rem;">ELO</div>
          <div style="font-size:1.3rem;font-weight:700;color:var(--red);">${eloB ? eloB.toFixed(1) : '—'}</div>
          <div style="margin-top:0.5rem;color:var(--muted);font-size:0.8rem;">Win probability</div>
          <div style="font-size:1.3rem;font-weight:700;color:${COLOR_B};">${(pred.probability_b*100).toFixed(1)}%</div>
          <div style="margin-top:0.5rem;color:var(--muted);font-size:0.8rem;">Skill composite</div>
          <div style="font-size:1.1rem;font-weight:700;">${pred.skill_composite_b != null ? pred.skill_composite_b.toFixed(1) : '—'}</div>
        </div>
      </div>`;
  }

  // ── Section 4: Skill comparison ─────────────────────────────────────────────
  function renderSkillSection(pred, faName, fbName) {
    const skillA = pred.skill_comparison?.fighter_a || {};
    const skillB = pred.skill_comparison?.fighter_b || {};
    if (!Object.keys(skillA).length && !Object.keys(skillB).length) {
      document.getElementById('skill-section').innerHTML = '';
      return;
    }

    const valsA = SKILL_DIMS.map(d => skillA[d] ?? 50);
    const valsB = SKILL_DIMS.map(d => skillB[d] ?? 50);

    document.getElementById('skill-section').innerHTML = `
      <hr class="divider">
      <h2 style="margin-bottom:0.75rem;">Skill Comparison</h2>
      <div class="grid-2" style="margin-bottom:1rem;">
        <div class="chart-box"><div id="skill-radar" style="height:320px;"></div></div>
        <div class="card" style="overflow-x:auto;">
          <table style="width:100%;border-collapse:collapse;font-size:0.85rem;">
            <thead>
              <tr>
                <th style="text-align:left;padding:4px 8px;color:var(--muted);font-weight:600;">Dimension</th>
                <th style="text-align:right;padding:4px 8px;color:${COLOR_A};">${faName}</th>
                <th style="text-align:right;padding:4px 8px;color:${COLOR_B};">${fbName}</th>
                <th style="text-align:right;padding:4px 8px;color:var(--muted);">&Delta;</th>
                <th style="text-align:left;padding:4px 8px;color:var(--muted);">Edge</th>
              </tr>
            </thead>
            <tbody id="skill-table-body"></tbody>
          </table>
        </div>
      </div>`;

    Plotly.newPlot('skill-radar', [
      {
        type: 'scatterpolar',
        r: [...valsA, valsA[0]],
        theta: [...SKILL_LABELS, SKILL_LABELS[0]],
        fill: 'toself',
        fillcolor: 'rgba(232,40,30,0.18)',
        line: { color: COLOR_A, width: 2 },
        name: faName,
      },
      {
        type: 'scatterpolar',
        r: [...valsB, valsB[0]],
        theta: [...SKILL_LABELS, SKILL_LABELS[0]],
        fill: 'toself',
        fillcolor: 'rgba(55,138,221,0.18)',
        line: { color: COLOR_B, width: 2 },
        name: fbName,
      },
    ], {
      ...PLOTLY_LAYOUT,
      polar: {
        bgcolor: 'rgba(0,0,0,0)',
        radialaxis: { range: [0, 100], showticklabels: true, tickfont: { size: 8 }, gridcolor: '#333' },
        angularaxis: { gridcolor: '#333' },
      },
      height: 300,
      margin: { l: 55, r: 55, t: 20, b: 20 },
      legend: {
        orientation: 'h', y: -0.05, x: 0.5, xanchor: 'center',
        font: { size: 11 }, bgcolor: 'rgba(0,0,0,0)',
      },
      showlegend: true,
    }, { displayModeBar: false, responsive: true });

    // Build advantage data array, sort in JS (NOT by parsing HTML text)
    const advData = SKILL_DIMS.map((d, i) => ({
      label: SKILL_LABELS[i],
      a: skillA[d] ?? 50,
      b: skillB[d] ?? 50,
      diff: (skillA[d] ?? 50) - (skillB[d] ?? 50),
    }));
    advData.sort((x, y) => x.diff - y.diff); // most B-favored first

    const rows = advData.map(row => {
      const color = row.diff > 0 ? COLOR_A : row.diff < 0 ? COLOR_B : 'var(--muted)';
      const edge  = row.diff > 0 ? faName  : row.diff < 0 ? fbName  : '—';
      return `<tr style="border-top:1px solid var(--border);">
        <td style="padding:5px 8px;">${row.label}</td>
        <td style="text-align:right;padding:5px 8px;color:${COLOR_A};">${row.a.toFixed(1)}</td>
        <td style="text-align:right;padding:5px 8px;color:${COLOR_B};">${row.b.toFixed(1)}</td>
        <td style="text-align:right;padding:5px 8px;color:${color};font-weight:700;">${row.diff >= 0 ? '+' : ''}${row.diff.toFixed(1)}</td>
        <td style="padding:5px 8px;color:${color};font-size:0.8rem;">${edge}</td>
      </tr>`;
    }).join('');
    document.getElementById('skill-table-body').innerHTML = rows;
  }

  // ── Section 5: Fight stats comparison ───────────────────────────────────────
  function renderStatsSection(profA, profB, faName, fbName) {
    const fsA = profA?.fight_stats;
    const fsB = profB?.fight_stats;
    if (!fsA || !fsB) {
      document.getElementById('stats-section').innerHTML = '';
      return;
    }

    document.getElementById('stats-section').innerHTML = `
      <hr class="divider">
      <h2 style="margin-bottom:0.75rem;">Fight Statistics Comparison</h2>

      <div class="grid-2" style="margin-bottom:1rem;">
        <div class="chart-box"><div id="method-chart" style="height:220px;"></div></div>
        <div class="chart-box"><div id="target-chart" style="height:220px;"></div></div>
      </div>

      <div class="grid-2" style="margin-bottom:1rem;">
        <div class="chart-box"><div id="striking-chart" style="height:220px;"></div></div>
        <div class="chart-box"><div id="grappling-chart" style="height:220px;"></div></div>
      </div>

      <div class="grid-2" style="margin-bottom:1rem;">
        <div class="card">
          <h3 style="margin-bottom:0.5rem;font-size:0.95rem;">KD / fight</h3>
          <div style="display:flex;gap:2rem;font-size:0.9rem;align-items:flex-end;">
            <div>
              <span style="color:${COLOR_A};font-size:0.8rem;">${faName}</span><br>
              <strong style="color:${COLOR_A};font-size:1.4rem;">${fsA.knockdowns_per_fight != null ? fsA.knockdowns_per_fight.toFixed(2) : '—'}</strong>
            </div>
            <div style="color:var(--muted);font-size:1.2rem;padding-bottom:2px;">vs</div>
            <div>
              <span style="color:${COLOR_B};font-size:0.8rem;">${fbName}</span><br>
              <strong style="color:${COLOR_B};font-size:1.4rem;">${fsB.knockdowns_per_fight != null ? fsB.knockdowns_per_fight.toFixed(2) : '—'}</strong>
            </div>
          </div>
        </div>
        <div class="card">
          <h3 style="margin-bottom:0.5rem;font-size:0.95rem;">Sub attempts / fight</h3>
          <div style="display:flex;gap:2rem;font-size:0.9rem;align-items:flex-end;">
            <div>
              <span style="color:${COLOR_A};font-size:0.8rem;">${faName}</span><br>
              <strong style="color:${COLOR_A};font-size:1.4rem;">${fsA.sub_attempts_per_fight != null ? fsA.sub_attempts_per_fight.toFixed(2) : '—'}</strong>
            </div>
            <div style="color:var(--muted);font-size:1.2rem;padding-bottom:2px;">vs</div>
            <div>
              <span style="color:${COLOR_B};font-size:0.8rem;">${fbName}</span><br>
              <strong style="color:${COLOR_B};font-size:1.4rem;">${fsB.sub_attempts_per_fight != null ? fsB.sub_attempts_per_fight.toFixed(2) : '—'}</strong>
            </div>
          </div>
        </div>
      </div>`;

    const baseLayout = (title) => ({
      ...PLOTLY_LAYOUT,
      barmode: 'group',
      height: 200,
      title: { text: title, font: { color: '#F0F2F6', size: 12 } },
      xaxis: { showgrid: false, showticklabels: false },
      yaxis: { showgrid: false },
      legend: {
        orientation: 'h', y: -0.18, x: 0.5, xanchor: 'center',
        font: { size: 10 }, bgcolor: 'rgba(0,0,0,0)',
      },
      margin: { l: 10, r: 65, t: 40, b: 30 },
    });

    // Win methods (% of wins)
    const methods = ['KO/TKO', 'SUB', 'DEC'];
    const twA = Math.max(Object.values(fsA.wins || {}).reduce((a, b) => a + b, 0), 1);
    const twB = Math.max(Object.values(fsB.wins || {}).reduce((a, b) => a + b, 0), 1);
    Plotly.newPlot('method-chart', [
      {
        name: faName,
        x: methods,
        y: methods.map(m => (fsA.wins?.[m] ?? 0) / twA * 100),
        type: 'bar',
        marker: { color: COLOR_A },
        text: methods.map(m => `${((fsA.wins?.[m] ?? 0) / twA * 100).toFixed(0)}%`),
        textposition: 'outside',
        textfont: { size: 11 },
      },
      {
        name: fbName,
        x: methods,
        y: methods.map(m => (fsB.wins?.[m] ?? 0) / twB * 100),
        type: 'bar',
        marker: { color: COLOR_B },
        text: methods.map(m => `${((fsB.wins?.[m] ?? 0) / twB * 100).toFixed(0)}%`),
        textposition: 'outside',
        textfont: { size: 11 },
      },
    ], baseLayout('Win methods (%)'), { displayModeBar: false, responsive: true });

    // Target breakdown (horizontal grouped)
    const targets = [
      { name: 'Head', keyA: 'head_pct', color: '#c04030' },
      { name: 'Body', keyA: 'body_pct', color: '#409040' },
      { name: 'Leg',  keyA: 'leg_pct',  color: '#6060c0' },
    ];
    Plotly.newPlot('target-chart',
      targets.map(t => ({
        name: t.name,
        y: [faName, fbName],
        x: [(fsA[t.keyA] ?? 0) * 100, (fsB[t.keyA] ?? 0) * 100],
        type: 'bar', orientation: 'h',
        marker: { color: t.color },
        text: [
          `${((fsA[t.keyA] ?? 0) * 100).toFixed(0)}%`,
          `${((fsB[t.keyA] ?? 0) * 100).toFixed(0)}%`,
        ],
        textposition: 'outside',
        textfont: { size: 11 },
      })),
      {
        ...baseLayout('Strike target breakdown (%)'),
        barmode: 'group',
        xaxis: { range: [0, 100], showticklabels: false, showgrid: false },
        yaxis: { showgrid: false },
        margin: { l: 10, r: 55, t: 40, b: 30 },
      },
      { displayModeBar: false, responsive: true }
    );

    // Striking comparison (horizontal)
    const strikingMetrics = [
      { label: 'Sig.str/min', valA: fsA.sig_strikes_per_min ?? 0, valB: fsB.sig_strikes_per_min ?? 0, fmt: v => v.toFixed(2) },
      { label: 'Accuracy',    valA: fsA.strike_accuracy ?? 0,     valB: fsB.strike_accuracy ?? 0,     fmt: v => `${(v*100).toFixed(0)}%` },
      { label: 'Defense',     valA: fsA.strike_defense ?? 0,      valB: fsB.strike_defense ?? 0,      fmt: v => `${(v*100).toFixed(0)}%` },
    ];
    Plotly.newPlot('striking-chart', [
      {
        name: faName,
        y: strikingMetrics.map(m => m.label),
        x: strikingMetrics.map(m => m.valA),
        type: 'bar', orientation: 'h',
        marker: { color: COLOR_A },
        text: strikingMetrics.map(m => m.fmt(m.valA)),
        textposition: 'outside', textfont: { size: 11 },
      },
      {
        name: fbName,
        y: strikingMetrics.map(m => m.label),
        x: strikingMetrics.map(m => m.valB),
        type: 'bar', orientation: 'h',
        marker: { color: COLOR_B },
        text: strikingMetrics.map(m => m.fmt(m.valB)),
        textposition: 'outside', textfont: { size: 11 },
      },
    ], { ...baseLayout('Striking'), xaxis: { showgrid: false, showticklabels: false }, yaxis: { showgrid: false } },
    { displayModeBar: false, responsive: true });

    // Grappling comparison (horizontal)
    const grapplingMetrics = [
      { label: 'TD/min',       valA: fsA.td_per_min   ?? 0, valB: fsB.td_per_min   ?? 0, fmt: v => v.toFixed(2) },
      { label: 'TD accuracy',  valA: fsA.td_accuracy  ?? 0, valB: fsB.td_accuracy  ?? 0, fmt: v => `${(v*100).toFixed(0)}%` },
      { label: 'TD defense',   valA: fsA.td_defense   ?? 0, valB: fsB.td_defense   ?? 0, fmt: v => `${(v*100).toFixed(0)}%` },
      { label: 'Ctrl %',       valA: fsA.ctrl_pct     ?? 0, valB: fsB.ctrl_pct     ?? 0, fmt: v => `${(v*100).toFixed(0)}%` },
    ];
    Plotly.newPlot('grappling-chart', [
      {
        name: faName,
        y: grapplingMetrics.map(m => m.label),
        x: grapplingMetrics.map(m => m.valA),
        type: 'bar', orientation: 'h',
        marker: { color: COLOR_A },
        text: grapplingMetrics.map(m => m.fmt(m.valA)),
        textposition: 'outside', textfont: { size: 11 },
      },
      {
        name: fbName,
        y: grapplingMetrics.map(m => m.label),
        x: grapplingMetrics.map(m => m.valB),
        type: 'bar', orientation: 'h',
        marker: { color: COLOR_B },
        text: grapplingMetrics.map(m => m.fmt(m.valB)),
        textposition: 'outside', textfont: { size: 11 },
      },
    ], { ...baseLayout('Grappling'), xaxis: { showgrid: false, showticklabels: false }, yaxis: { showgrid: false } },
    { displayModeBar: false, responsive: true });
  }

  // ── Section 6: ELO Simulator ─────────────────────────────────────────────────
  function renderSimulatorSection(faName, fbName) {
    document.getElementById('simulator-section').innerHTML = `
      <hr class="divider">
      <h2 style="margin-bottom:0.25rem;">ELO Simulator</h2>
      <p style="color:var(--muted);font-size:0.85rem;margin-bottom:1rem;">
        Exact ELO delta for any fight outcome — same formula as the ranking engine.
      </p>
      <div class="form-row" style="margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem;">
        <div class="form-group" style="max-width:160px;">
          <label>Method</label>
          <select id="sim-method">
            <option>KO/TKO</option>
            <option>SUB</option>
            <option>DEC U</option>
            <option>DEC M</option>
            <option>DEC S</option>
          </select>
        </div>
        <div class="form-group" style="max-width:120px;">
          <label>Round</label>
          <select id="sim-round">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
        </div>
        <div class="form-group" style="max-width:140px;justify-content:flex-end;padding-top:1.4rem;">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:400;">
            <input type="checkbox" id="sim-title" style="accent-color:var(--red);width:16px;height:16px;">
            Title fight
          </label>
        </div>
      </div>
      <div id="sim-results" class="grid-2"></div>`;

    function updateSim() {
      if (!simData) {
        document.getElementById('sim-results').innerHTML =
          '<div class="alert-error" style="grid-column:1/-1;">Simulator data unavailable.</div>';
        return;
      }
      const method  = document.getElementById('sim-method').value;
      const rnd     = parseInt(document.getElementById('sim-round').value, 10);
      const isTitle = document.getElementById('sim-title').checked;

      const scA = simScenario(simData, 'a', method, rnd, isTitle);
      const scB = simScenario(simData, 'b', method, rnd, isTitle);

      function simCard(sc, winnerName, loserName, wColor, lColor) {
        const exp = sc.expected_winner;
        let insight = '';
        if (exp < 0.45) {
          insight = `Upset — ${winnerName} was the underdog (${(exp*100).toFixed(0)}% expected).`;
        } else if (exp > 0.70) {
          insight = `Expected result — ${winnerName} was heavily favored (${(exp*100).toFixed(0)}%).`;
        }
        const isDec = method.startsWith('DEC');
        if (!isDec && rnd === 1) {
          insight += (insight ? ' ' : '') + 'First-round finish: maximum method weight.';
        }
        const clmNote = sc.consec_loss_mult > 1.0
          ? `&nbsp;&middot;&nbsp; CLM: <strong style="color:var(--text);">${sc.consec_loss_mult}&times;</strong>`
          : '';
        return `
          <div class="card">
            <div style="color:${wColor};font-size:1rem;font-weight:700;margin-bottom:0.75rem;">
              ${winnerName} wins
            </div>
            <div style="display:flex;gap:1.5rem;margin-bottom:0.75rem;flex-wrap:wrap;">
              <div>
                <div style="font-size:0.75rem;color:var(--muted);margin-bottom:2px;">${winnerName} ELO</div>
                <div style="font-size:1.15rem;font-weight:700;">
                  ${sc.elo_winner_after}
                  <span style="color:var(--green);font-size:0.85rem;">+${sc.delta_winner}</span>
                </div>
              </div>
              <div>
                <div style="font-size:0.75rem;color:var(--muted);margin-bottom:2px;">${loserName} ELO</div>
                <div style="font-size:1.15rem;font-weight:700;">
                  ${sc.elo_loser_after}
                  <span style="color:var(--red);font-size:0.85rem;">${sc.delta_loser}</span>
                </div>
              </div>
            </div>
            <div style="font-size:0.78rem;color:var(--muted);line-height:1.7;">
              Win prob: <strong style="color:var(--text);">${(exp*100).toFixed(1)}%</strong>
              &nbsp;&middot;&nbsp;
              K win: <strong style="color:var(--text);">${sc.k_winner.toFixed(1)}</strong>
              &nbsp;&middot;&nbsp;
              K lose: <strong style="color:var(--text);">${sc.k_loser.toFixed(1)}</strong>
              &nbsp;&middot;&nbsp;
              Method wt: <strong style="color:var(--text);">${sc.fight_weight.toFixed(3)}</strong>
              ${clmNote}
            </div>
            ${insight ? `<div style="margin-top:0.5rem;font-size:0.8rem;color:var(--muted);font-style:italic;">${insight}</div>` : ''}
          </div>`;
      }

      document.getElementById('sim-results').innerHTML =
        simCard(scA, faName, fbName, COLOR_A, COLOR_B) +
        simCard(scB, fbName, faName, COLOR_B, COLOR_A);
    }

    ['sim-method', 'sim-round', 'sim-title'].forEach(id => {
      document.getElementById(id).addEventListener('change', updateSim);
    });
    updateSim();
  }

  // ── Section 7: How it works ───────────────────────────────────────────────────
  function renderHowItWorks() {
    document.getElementById('how-it-works').innerHTML = `
      <hr class="divider">
      <details style="margin-bottom:2rem;">
        <summary style="cursor:pointer;font-size:1rem;font-weight:700;padding:0.5rem 0;
                        list-style:none;display:flex;align-items:center;gap:0.5rem;user-select:none;">
          <span id="how-arrow">&#9658;</span> How the prediction works
        </summary>
        <div style="padding:1rem;background:var(--surface);border-radius:8px;margin-top:0.5rem;
                    font-size:0.875rem;line-height:1.7;color:var(--muted);">
          <p>
            <strong style="color:var(--text);">1. ELO win probability</strong><br>
            P(A wins) = 1 / (1 + 10<sup>((ELO_B &minus; ELO_A) / 400)</sup>)<br>
            A 200-point ELO gap gives ~76% win probability to the higher-rated fighter.
          </p>
          <p>
            <strong style="color:var(--text);">2. Skill composite</strong><br>
            Each fighter has 7 dimensions (Striking, Grappling, Defense, Consistency, Finish Rate, Cardio,
            Pressure) scored 0&ndash;100. A weighted composite is computed:<br>
            Composite = 0.20&times;Striking + 0.15&times;Grappling + 0.20&times;Defense +
            0.15&times;Consistency + 0.10&times;Finish Rate + 0.10&times;Cardio + 0.10&times;Pressure
          </p>
          <p>
            <strong style="color:var(--text);">3. Blended probability</strong><br>
            skill_diff = (composite_A &minus; composite_B) / 100<br>
            P_final = P_elo + skill_diff &times; 0.10 (capped at [0.05, 0.95])<br>
            The skill adjustment can shift the pure ELO probability by up to &plusmn;10%.
          </p>
          <p>
            <strong style="color:var(--text);">4. Method prediction</strong><br>
            Based on the favored fighter's Striking, Grappling, and Finish Rate dimensions:
            high finish rate + high striking &rarr; KO/TKO; high grappling &rarr; SUB; otherwise &rarr; DEC.
          </p>
          <p>
            <strong style="color:var(--text);">5. ELO change formula</strong><br>
            &Delta;_winner = K_base &times; method_wt &times; streak_mult &times; k_var &times; (1 &minus; expected)<br>
            &Delta;_loser = K_base &times; loss_wt &times; CLM &times; streak_mult &times; k_var &times; (0 &minus; expected)<br>
            CLM (consecutive loss multiplier) amplifies ELO loss for fighters on losing streaks.
          </p>
        </div>
      </details>`;

    const details = document.querySelector('#how-it-works details');
    const arrow   = document.getElementById('how-arrow');
    details.addEventListener('toggle', () => {
      arrow.innerHTML = details.open ? '&#9660;' : '&#9658;';
    });
  }

  divSel.addEventListener('change', loadDiv);
  faSel.addEventListener('change', predict);
  fbSel.addEventListener('change', predict);
  await loadDiv();
});
</script>
</body>
</html>
