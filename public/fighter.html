<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fighter — UFCelo.gg</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .fight-row { cursor: pointer; transition: background 0.1s; }
    .fight-row:hover { background: rgba(255,255,255,0.04); }
    .fight-row.expanded { background: rgba(232,40,30,0.06); }
    .fight-row td:first-child::before { content: '▶'; font-size: 0.65rem; color: var(--muted); margin-right: 6px; transition: transform 0.15s; display: inline-block; }
    .fight-row.expanded td:first-child::before { transform: rotate(90deg); }
    .expand-row td { padding: 0 !important; }
    .expand-content { padding: 0.85rem 1.25rem 1rem 2.5rem; background: rgba(0,0,0,0.22); border-bottom: 1px solid var(--border); }
    .exp-section-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.4rem; margin-top: 0.75rem; }
    .exp-section-title:first-child { margin-top: 0; }
    .kd-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 0.25rem 1rem; font-size: 0.78rem; }
    .kd-item { color: var(--muted); }
    .kd-item strong { color: var(--text); }
    .insight-pill { display: inline-block; background: rgba(255,255,255,0.07); border-radius: 20px; padding: 0.25rem 0.85rem; font-size: 0.8rem; color: var(--text); }
    .proj-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; margin-top: 0.4rem; }
    .proj-table th { color: var(--muted); font-weight: 600; padding: 3px 8px; text-align: right; border-bottom: 1px solid var(--border); }
    .proj-table th:first-child { text-align: left; }
    .proj-table td { padding: 3px 8px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .proj-table td:first-child { text-align: left; color: var(--text); }
    .proj-table td:nth-child(2) { color: var(--muted); }
    .g { color: var(--green) !important; font-weight: 600; }
    .r { color: var(--red)   !important; font-weight: 600; }
    /* Skill breakdown */
    .skill-breakdown-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.35rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .skill-breakdown-row:last-child { border-bottom: none; }
    .skill-bd-label { min-width: 140px; font-size: 0.82rem; color: var(--muted); }
    .skill-bd-bar-wrap { flex: 1; background: var(--surface2); border-radius: 4px; height: 8px; overflow: hidden; }
    .skill-bd-bar { height: 8px; border-radius: 4px; }
    .skill-bd-score { min-width: 40px; text-align: right; font-size: 0.82rem; font-weight: 700; }
    .skill-bd-weight { min-width: 36px; text-align: right; font-size: 0.72rem; color: var(--muted); }
  </style>
</head>
<body>
<main class="container">
  <div class="page-header">
    <h1>Fighter Profile</h1>
  </div>

  <div class="form-row" style="align-items:flex-end;">
    <div class="form-group" style="max-width:240px;">
      <label>Division</label>
      <select id="div-sel"></select>
    </div>
    <div class="form-group" style="max-width:340px;">
      <label>Fighter</label>
      <select id="fighter-sel"></select>
    </div>
    <div class="form-group" style="justify-content:flex-end;padding-bottom:0.15rem;">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:400;font-size:0.85rem;color:var(--muted);">
        <input type="checkbox" id="retired-toggle" style="accent-color:var(--red);width:15px;height:15px;">
        Include retired fighters
      </label>
    </div>
  </div>

  <div id="profile"></div>
</main>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="/app.js"></script>
<script>
const SKILL_DIMS   = ['Striking','Grappling','Defensa','Consistencia','Finish Rate','Cardio/Durabilidad','Presión'];
const SKILL_LABELS = ['Striking','Grappling','Defense','Consistency','Finish Rate','Cardio / Durability','Pressure'];
const SKILL_WEIGHTS = { 'Striking':0.20,'Grappling':0.15,'Defensa':0.20,'Consistencia':0.15,'Finish Rate':0.10,'Cardio/Durabilidad':0.10,'Presión':0.10 };
const SKILL_DESC = {
  'Striking':          'Sig. strike rate, accuracy, and knockdown power.',
  'Grappling':         'Takedown rate, accuracy, defense, and control time.',
  'Defensa':           'Ability to avoid strikes and deny takedowns.',
  'Consistencia':      'Performance stability — avoids long losing streaks.',
  'Finish Rate':       'Proportion of wins by KO/TKO or submission.',
  'Cardio/Durabilidad':'Typically goes further without finishing (proxy for endurance).',
  'Presión':           'Frequency of being the finishing fighter (KO/TKO wins).',
};
const ORANGE = '#D85A30';
const BLUE   = '#378ADD';

// ── ELO simulation helpers ───────────────────────────────────────────────────
const DIV_K_MULT = {
  'heavyweight':1.00,'light heavyweight':0.95,'middleweight':0.90,
  'welterweight':0.75,'lightweight':0.80,'featherweight':0.75,
  'bantamweight':0.75,'flyweight':0.75,
};
const K_BASE = 32.0;
const METHOD_WIN_W = {
  'KO/TKO':{1:1.40,2:1.25,3:1.10,4:1.10,5:1.10},
  'SUB':   {1:1.25,2:1.25,3:1.10,4:1.10,5:1.10},
  'DEC U': {3:1.05,5:1.05},
  'DEC M': {3:0.90,5:0.90},
  'DEC S': {3:0.80,5:0.80},
};
const METHOD_LOSS_W = {
  'KO/TKO':{1:1.40,2:1.25,3:1.10,4:1.10,5:1.10},
  'SUB':   {1:1.20,2:1.20,3:1.20,4:1.20,5:1.20},
  'DEC U': {3:1.05,5:1.05},
  'DEC M': {3:0.90,5:0.90},
  'DEC S': {3:0.80,5:0.80},
};
function varK(fightCount, div) {
  const base = fightCount < 5 ? 2.0 : fightCount < 15 ? 1.0 : 0.625;
  return base * (DIV_K_MULT[div.toLowerCase()] || 0.90);
}
function streakMult(streak) {
  if (streak >= 8)  return 1.35;
  if (streak >= 5)  return 1.25;
  if (streak >= 3)  return 1.15;
  if (streak <= -8) return 1.55;
  if (streak <= -5) return 1.40;
  if (streak <= -3) return 1.25;
  return 1.0;
}
function clm(streak) {
  const c = Math.max(0, -streak) + 1;
  if (c >= 5) return 1.80; if (c >= 4) return 1.60;
  if (c >= 3) return 1.40; if (c >= 2) return 1.20;
  return 1.00;
}
function simProjection(eloF, eloR, kVarF, kVarR, streakF, streakR, method, rnd) {
  const smF = streakMult(streakF);
  const expF = 1.0 / (1.0 + Math.pow(10, (eloR - eloF) / 400));
  const ww = (METHOD_WIN_W[method] || {})[rnd]  ?? 1.0;
  const lw = (METHOD_LOSS_W[method] || {})[rnd] ?? 1.0;
  const kWin = K_BASE * ww * smF * kVarF;
  let dWin = kWin * (1.0 - expF);
  if (eloR < 1300 && dWin > 8.0) dWin = 8.0;
  dWin = Math.max(dWin, 1.0);
  const cm = clm(streakF);
  const kLose = K_BASE * lw * cm * smF * kVarF;
  let dLose = kLose * (0.0 - expF);
  dLose = Math.max(-80.0, Math.min(dLose, -1.0));
  return {
    winAfter:  +(Math.max(1000, eloF + dWin)).toFixed(1),
    loseAfter: +(Math.max(1000, eloF + dLose)).toFixed(1),
    dWin:  +dWin.toFixed(1),
    dLose: +dLose.toFixed(1),
  };
}

// ── Body hit-zone heatmap ─────────────────────────────────────────────────────
function heatColor(pct) {
  if (pct < 0.20) return '#22c55e';       // green  — rarely
  if (pct < 0.40) return '#f59e0b';       // amber  — moderate
  return '#ef4444';                        // red    — frequently
}
function heatLabel(pct) {
  if (pct < 0.20) return 'low';
  if (pct < 0.40) return 'mid';
  return 'high';
}
function buildHeatmapSVG(headPct, bodyPct, legPct, name) {
  const W = 130, padT = 18, padB = 30;
  const cx  = W / 2;
  const hR  = 20,  hCY = padT + hR;
  const trW = 54,  trX = cx - trW/2, trY = hCY + hR + 3, trH = 90;
  const lW  = 22,  lH  = 100, lY = trY + trH + 2;
  const svgH = padT + hR*2 + 3 + trH + 2 + lH + padB;

  const hC = heatColor(headPct), bC = heatColor(bodyPct), lC = heatColor(legPct);
  const f = n => n.toFixed(1);

  return `<svg viewBox="0 0 ${W} ${svgH}" width="100%" style="max-height:280px;display:block;margin:0 auto;">
    <!-- head -->
    <circle cx="${f(cx)}" cy="${f(hCY)}" r="${hR}" fill="${hC}" fill-opacity="0.55" stroke="${hC}" stroke-width="2"/>
    <text x="${f(cx)}" y="${f(hCY+4)}" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">${(headPct*100).toFixed(0)}%</text>

    <!-- torso -->
    <rect x="${f(trX)}" y="${f(trY)}" width="${trW}" height="${trH}" rx="8" fill="${bC}" fill-opacity="0.55" stroke="${bC}" stroke-width="2"/>
    <text x="${f(cx)}" y="${f(trY+trH/2+4)}" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">${(bodyPct*100).toFixed(0)}%</text>

    <!-- left leg -->
    <rect x="${f(cx-26)}" y="${f(lY)}" width="${lW}" height="${lH}" rx="5" fill="${lC}" fill-opacity="0.55" stroke="${lC}" stroke-width="2"/>
    <!-- right leg -->
    <rect x="${f(cx+4)}"  y="${f(lY)}" width="${lW}" height="${lH}" rx="5" fill="${lC}" fill-opacity="0.55" stroke="${lC}" stroke-width="2"/>
    <text x="${f(cx)}" y="${f(lY+lH/2+4)}" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">${(legPct*100).toFixed(0)}%</text>

    <!-- legend -->
    <text x="${f(cx)}" y="${f(svgH-2)}" text-anchor="middle" font-size="9" fill="#888">${name || ''}</text>

    <!-- zone labels -->
    <text x="${f(trX-4)}" y="${f(hCY+4)}" text-anchor="end" font-size="8" fill="${hC}">Head</text>
    <text x="${f(trX-4)}" y="${f(trY+trH/2+3)}" text-anchor="end" font-size="8" fill="${bC}">Body</text>
    <text x="${f(trX-4)}" y="${f(lY+lH/2+3)}" text-anchor="end" font-size="8" fill="${lC}">Legs</text>
  </svg>`;
}

// ── Single-fighter silhouette SVG ────────────────────────────────────────────
function makeFigureSVG(cx, feetY, H, R, color) {
  const fill = color + '28';
  const sw   = Math.max(1.2, H * 0.007);
  const hr   = H * 0.075;
  const hcy  = feetY - H + hr;
  const shY = feetY - H * 0.860, shX  = H * 0.115;
  const wstY= feetY - H * 0.470, wstX = H * 0.078;
  const hipY= feetY - H * 0.400, hipX = H * 0.095;
  const knY = feetY - H * 0.240, knX  = H * 0.070;
  const anY = feetY - H * 0.055, anX  = H * 0.054;
  const ftX = H * 0.088;
  const armH= R / 2;
  const f   = n => n.toFixed(1);
  const path = [
    `M ${f(cx)},${f(shY)}`,
    `L ${f(cx-shX)},${f(shY)}`,
    `Q ${f(cx-shX*1.10)},${f(wstY)} ${f(cx-wstX)},${f(wstY)}`,
    `Q ${f(cx-hipX*1.05)},${f(hipY)} ${f(cx-hipX)},${f(hipY)}`,
    `L ${f(cx-knX)},${f(knY)} L ${f(cx-anX)},${f(anY)}`,
    `L ${f(cx-ftX)},${f(feetY)} L ${f(cx+ftX)},${f(feetY)}`,
    `L ${f(cx+anX)},${f(anY)} L ${f(cx+knX)},${f(knY)}`,
    `L ${f(cx+hipX)},${f(hipY)}`,
    `Q ${f(cx+hipX*1.05)},${f(hipY)} ${f(cx+wstX)},${f(wstY)}`,
    `Q ${f(cx+shX*1.10)},${f(wstY)} ${f(cx+shX)},${f(shY)} Z`,
  ].join(' ');
  const nw = H * 0.035;
  return [
    `<line x1="${f(cx)}" y1="${f(hcy+hr)}" x2="${f(cx)}" y2="${f(shY)}" stroke="${color}" stroke-width="${f(nw)}" stroke-linecap="round"/>`,
    `<circle cx="${f(cx)}" cy="${f(hcy)}" r="${f(hr)}" fill="${fill}" stroke="${color}" stroke-width="${f(sw)}"/>`,
    `<path d="${path}" fill="${fill}" stroke="${color}" stroke-width="${f(sw)}" stroke-linejoin="round"/>`,
    `<line x1="${f(cx-shX)}" y1="${f(shY)}" x2="${f(cx-armH)}" y2="${f(shY)}" stroke="${color}" stroke-width="${f(H*0.026)}" stroke-linecap="round"/>`,
    `<line x1="${f(cx+shX)}" y1="${f(shY)}" x2="${f(cx+armH)}" y2="${f(shY)}" stroke="${color}" stroke-width="${f(H*0.026)}" stroke-linecap="round"/>`,
  ].join('\n');
}
function buildSingleSilhouette(hInches, rInches, wLbs) {
  const BODY_H = 200;
  const H = hInches || 70, R = rInches || H;
  const scale = BODY_H / H;
  const Hpx = H * scale, Rpx = R * scale;
  const padX = 16, padTop = 20, padBot = 30;
  const cx = padX + Rpx / 2;
  const svgW = cx + Rpx / 2 + padX;
  const feetY = padTop + BODY_H;
  const svgH = feetY + padBot;
  const f = n => n.toFixed(1);
  const body = makeFigureSVG(cx, feetY, Hpx, Rpx, ORANGE);
  const ft = inches => `${Math.floor(inches/12)}'${Math.round(inches%12)}"`;
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${f(svgW)} ${f(svgH)}" width="100%" style="max-height:280px;display:block;margin:0 auto;">
  ${body}
  <text x="${f(cx)}" y="${f(svgH-4)}" text-anchor="middle" font-size="9" fill="#777" font-family="monospace">${ft(H)} · ${R.toFixed(0)}" reach${wLbs ? ' · ' + wLbs + ' lbs' : ''}</text>
</svg>`;
}

// ── Toggle expand row ────────────────────────────────────────────────────────
function toggleExpand(rowEl, expandId) {
  const expRow = document.getElementById(expandId);
  if (!expRow) return;
  const isOpen = expRow.style.display !== 'none';
  expRow.style.display = isOpen ? 'none' : '';
  rowEl.classList.toggle('expanded', !isOpen);
}

document.addEventListener('DOMContentLoaded', async () => {
  const divSel        = document.getElementById('div-sel');
  const fighterSel    = document.getElementById('fighter-sel');
  const retiredToggle = document.getElementById('retired-toggle');
  let rankingsCache   = {};

  populateDivSelect(divSel);

  async function loadDiv() {
    const div      = divSel.value;
    const retired  = retiredToggle.checked;
    const endpoint = retired
      ? `/rankings/${divSlug(div)}/alltime`
      : `/rankings/${divSlug(div)}`;

    // Don't use cache if retired mode changes between loads
    const cacheKey = div + (retired ? '_all' : '');
    if (!rankingsCache[cacheKey]) {
      try { rankingsCache[cacheKey] = await apiFetch(endpoint); }
      catch(e) { rankingsCache[cacheKey] = []; }
    }
    populateFighterSelect(fighterSel, rankingsCache[cacheKey]);
    await loadFighter();
  }

  async function loadFighter() {
    const fid = fighterSel.value;
    const div = divSel.value;
    if (!fid) return;
    document.getElementById('profile').innerHTML = '<div class="loading">Loading profile…</div>';

    const [profRes] = await Promise.allSettled([
      apiFetch(`/fighter/${fid}?division=${divSlug(div)}`)
    ]);

    if (profRes.status === 'rejected') {
      document.getElementById('profile').innerHTML = `<div class="alert-error">Fighter not found.</div>`;
      return;
    }
    try {
      const cacheKey = div + (retiredToggle.checked ? '_all' : '');
      renderProfile(profRes.value, div, rankingsCache[cacheKey] || []);
    } catch(e) {
      console.error('renderProfile error:', e);
      document.getElementById('profile').innerHTML =
        `<div class="alert-error">Error rendering profile: ${e.message}</div>`;
    }
  }

  function renderProfile(p, div, rankings) {
    const rankEntry  = rankings.find(f => f.fighter_id === p.fighter_id);
    const rankNum    = rankEntry ? (rankings.indexOf(rankEntry) + 1) : '—';
    const streak     = rankEntry ? (rankEntry.streak || 0) : 0;
    const isChamp    = rankEntry ? !!rankEntry.is_champion : false;
    const history    = p.elo_history || [];
    const peakElo    = rankEntry?.peak_elo ?? (history.length ? Math.max(...history.map(h => h.elo)) : p.elo);
    const fightCount = history.length;
    const isRetired  = rankEntry && rankEntry.active === false;

    const physFields = [
      { label: 'Country', val: p.country },
      { label: 'Height',  val: p.height  },
      { label: 'Weight',  val: p.weight  },
      { label: 'Reach',   val: p.reach   },
      { label: 'Stance',  val: p.stance  },
    ].filter(f => f.val != null && f.val !== '');

    const physCards = physFields.map(f => `
      <div class="metric">
        <div class="metric-label">${f.label}</div>
        <div class="metric-value" style="font-size:0.95rem;">${f.val}</div>
      </div>`).join('');

    document.getElementById('profile').innerHTML = `
      <div style="margin-bottom:0.5rem;">
        <span style="font-size:1.6rem;font-weight:800;color:var(--text);">${p.fighter_name || '—'}</span>
        ${isChamp ? '&nbsp;' + champBadge() : ''}
        ${streak >= 3 ? '&nbsp;' + streakBadge(streak) : ''}
        ${streak <= -3 ? '&nbsp;' + streakBadge(streak) : ''}
        ${isRetired ? '&nbsp;<span style="font-size:0.72rem;background:var(--surface2);color:var(--muted);border-radius:12px;padding:2px 8px;font-weight:600;letter-spacing:0.04em;">RETIRED</span>' : ''}
      </div>

      <div class="metrics-row" style="margin-bottom:0.75rem;">
        <div class="metric">
          <div class="metric-label">Current ELO</div>
          <div class="metric-value" style="color:var(--red);">${p.elo != null ? p.elo.toFixed(1) : '—'}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Peak ELO</div>
          <div class="metric-value">${peakElo != null ? (+peakElo).toFixed(0) : '—'}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Record</div>
          <div class="metric-value">${p.record || '—'}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Division Rank</div>
          <div class="metric-value">${rankNum !== '—' ? '#' + rankNum : '—'}</div>
          ${streak >= 3 ? `<div class="metric-delta pos">+${streak}W streak</div>` : ''}
          ${streak <= -3 ? `<div class="metric-delta neg">${streak}L streak</div>` : ''}
        </div>
        <div class="metric">
          <div class="metric-label">Fights in DB</div>
          <div class="metric-value">${fightCount || '—'}</div>
        </div>
        ${p.skill_composite != null ? `
        <div class="metric">
          <div class="metric-label">Skill Score</div>
          <div class="metric-value" style="color:${ORANGE};">${p.skill_composite.toFixed(1)}</div>
        </div>` : ''}
      </div>

      ${physCards ? `<div class="metrics-row" style="margin-bottom:1rem;">${physCards}</div>` : ''}

      <hr class="divider">

      <div class="grid-2" style="margin-bottom:1rem;">
        <div class="chart-box">
          <div style="font-size:0.8rem;color:var(--muted);text-align:center;margin-bottom:0.25rem;">Skill Radar</div>
          <div id="skill-radar" style="height:280px;"></div>
        </div>
        <div class="chart-box">
          <div style="font-size:0.8rem;color:var(--muted);text-align:center;margin-bottom:0.25rem;">ELO History</div>
          <div id="elo-chart" style="height:280px;"></div>
        </div>
      </div>

      <div id="skill-breakdown-section" style="margin-bottom:1.5rem;"></div>
      <div id="fight-table" style="margin-bottom:2rem;"></div>
      <div id="stats-section"></div>`;

    // ── Skill radar ──────────────────────────────────────────────────────────
    try {
      const skill = p.skill_score || {};
      if (Object.keys(skill).length > 0) {
        const vals = SKILL_DIMS.map(d => skill[d] ?? 50);
        Plotly.newPlot('skill-radar', [{
          type: 'scatterpolar',
          r: [...vals, vals[0]],
          theta: [...SKILL_LABELS, SKILL_LABELS[0]],
          fill: 'toself',
          fillcolor: 'rgba(216,90,48,0.2)',
          line: { color: ORANGE, width: 2 },
          name: p.fighter_name || '',
        }], {
          ...PLOTLY_LAYOUT,
          polar: {
            bgcolor: 'rgba(0,0,0,0)',
            radialaxis: { range:[0,100], showticklabels:true, tickfont:{size:8}, gridcolor:'#333' },
            angularaxis: { gridcolor: '#333' },
          },
          height: 260,
          margin: { l:55, r:55, t:15, b:15 },
          showlegend: false,
        }, { displayModeBar: false, responsive: true });
      } else {
        document.getElementById('skill-radar').innerHTML =
          '<div style="color:var(--muted);text-align:center;padding-top:60px;font-size:0.85rem;">No skill data</div>';
      }
    } catch(e) { console.error('skill radar:', e); }

    // ── ELO history chart ────────────────────────────────────────────────────
    try {
      if (history.length) {
        const dates  = history.map(h => h.date);
        const elos   = history.map(h => h.elo);
        const colors = history.map(h =>
          h.result === 'Win' ? '#22c55e' : h.result === 'Loss' ? '#E8281E' : '#888888');
        const hover = history.map(h => {
          const d = h.elo_change != null
            ? ` (${h.elo_change >= 0 ? '+' : ''}${h.elo_change.toFixed(1)})`
            : '';
          const t = h.is_title_fight ? ' [T]' : '';
          return `<b>${h.result}</b> vs ${h.opponent_name || '?'}` +
                 `<br>${h.method || ''}${t}` +
                 `<br>ELO ${h.elo.toFixed(1)}${d}` +
                 `<br>${h.event || ''}`;
        });
        Plotly.newPlot('elo-chart', [{
          x: dates, y: elos,
          type: 'scatter', mode: 'lines+markers',
          line: { color: ORANGE, width: 2 },
          marker: { color: colors, size: 8, line: { color: '#fff', width: 1 } },
          text: hover, hovertemplate: '%{text}<extra></extra>',
        }], {
          ...PLOTLY_LAYOUT,
          height: 260,
          xaxis: { showgrid: false, tickfont: { size: 10 } },
          yaxis: { gridcolor: '#2d3250', title: { text: 'ELO', font: { size: 11 } } },
          hovermode: 'closest',
          margin: { l:50, r:20, t:10, b:40 },
          shapes: [{
            type: 'line', x0: dates[0], x1: dates[dates.length-1],
            y0: 1500, y1: 1500,
            line: { color: '#555', dash: 'dot', width: 1 },
          }],
        }, { displayModeBar: false, responsive: true });
      } else {
        document.getElementById('elo-chart').innerHTML =
          '<div style="color:var(--muted);text-align:center;padding-top:60px;font-size:0.85rem;">No fight history</div>';
      }
    } catch(e) { console.error('elo chart:', e); }

    // ── Skill breakdown analysis ─────────────────────────────────────────────
    try {
      const skill = p.skill_score || {};
      if (Object.keys(skill).length > 0) {
        const composite = p.skill_composite ?? 50;
        const sorted = SKILL_DIMS
          .map(d => ({ dim: d, label: SKILL_LABELS[SKILL_DIMS.indexOf(d)], score: skill[d] ?? 50, weight: SKILL_WEIGHTS[d] }))
          .sort((a, b) => b.score - a.score);
        const strongest = sorted[0];
        const weakest   = sorted[sorted.length - 1];

        const rows = sorted.map(s => {
          const score    = s.score;
          const color    = score >= 70 ? '#22c55e' : score >= 45 ? '#f59e0b' : '#ef4444';
          const barWidth = score.toFixed(1);
          return `<div class="skill-breakdown-row">
            <div class="skill-bd-label" title="${SKILL_DESC[s.dim]}">${s.label}</div>
            <div class="skill-bd-bar-wrap">
              <div class="skill-bd-bar" style="width:${barWidth}%;background:${color};"></div>
            </div>
            <div class="skill-bd-score" style="color:${color};">${score.toFixed(1)}</div>
            <div class="skill-bd-weight">${(s.weight*100).toFixed(0)}%</div>
          </div>`;
        }).join('');

        document.getElementById('skill-breakdown-section').innerHTML = `
          <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
              <h3 style="margin:0;">Skill Breakdown</h3>
              <div style="font-size:0.8rem;color:var(--muted);">
                Composite: <strong style="color:${ORANGE};font-size:1rem;">${composite.toFixed(1)}</strong>
              </div>
            </div>
            <div style="font-size:0.8rem;color:var(--muted);margin-bottom:0.75rem;line-height:1.6;">
              Strongest: <strong style="color:#22c55e;">${strongest.label} (${strongest.score.toFixed(0)})</strong>
              &nbsp;&middot;&nbsp;
              Weakest: <strong style="color:#ef4444;">${weakest.label} (${weakest.score.toFixed(0)})</strong>
            </div>
            <div style="margin-bottom:0.5rem;">${rows}</div>
            <div style="font-size:0.72rem;color:var(--muted);margin-top:0.5rem;line-height:1.5;">
              Composite = 0.20×Striking + 0.20×Defense + 0.15×Grappling + 0.15×Consistency + 0.10×Finish Rate + 0.10×Cardio + 0.10×Pressure
              &nbsp;&middot;&nbsp; Bar width shows weight in the <em>right column (weight %)</em>.
              <br>Hover or tap a label to see what each dimension measures.
            </div>
          </div>`;
      }
    } catch(e) { console.error('skill breakdown:', e); }

    // ── Fight history table with expandable rows ─────────────────────────────
    try {
      if (history.length) {
        const kVarF   = varK(fightCount, div);
        const rivals5 = buildRivals5(p.fighter_id, p.elo, rankings);

        const rows = [...history].reverse().map((h, idx) => {
          const result   = h.result || '—';
          const resultCl = result === 'Win'  ? 'color:var(--green);'
                         : result === 'Loss' ? 'color:var(--red);'
                         : 'color:var(--muted);';
          const eloCl    = h.elo_change > 0 ? 'color:var(--green);'
                         : h.elo_change < 0 ? 'color:var(--red);'
                         : 'color:var(--muted);';
          const delta    = h.elo_change != null
            ? `<span style="${h.elo_change >= 0 ? 'color:var(--green)' : 'color:var(--red)'};">${h.elo_change >= 0 ? '+' : ''}${h.elo_change.toFixed(1)}</span>`
            : '—';
          const tBadge   = h.is_title_fight
            ? ' <span style="color:var(--red);font-size:0.7rem;font-weight:700;">[T]</span>' : '';
          const expandId = `exp-${idx}`;
          const expandHtml = buildExpandHtml(h, p.elo, kVarF, streak, div, rivals5);

          return `<tr class="fight-row" onclick="toggleExpand(this,'${expandId}')">
              <td style="color:var(--muted);font-size:0.8rem;white-space:nowrap;">${h.date || '—'}</td>
              <td style="${resultCl}font-weight:600;">${result}</td>
              <td>${h.opponent_name || '—'}</td>
              <td>${h.method || '—'}${tBadge}</td>
              <td style="color:var(--muted);text-align:center;">${h.round || '—'}</td>
              <td style="${eloCl}font-weight:600;text-align:right;">${h.elo != null ? h.elo.toFixed(1) : '—'}</td>
              <td style="text-align:right;">${delta}</td>
            </tr>
            <tr id="${expandId}" style="display:none;" class="expand-row">
              <td colspan="7">${expandHtml}</td>
            </tr>`;
        }).join('');

        document.getElementById('fight-table').innerHTML = `
          <p style="font-size:0.78rem;color:var(--muted);margin-bottom:0.5rem;">
            Click any row to expand breakdown &amp; ELO projection.
          </p>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Date</th><th>Result</th><th>Opponent</th>
                  <th>Method</th>
                  <th style="text-align:center;">Rd</th>
                  <th style="text-align:right;">ELO</th>
                  <th style="text-align:right;">&Delta; ELO</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      }
    } catch(e) { console.error('fight table:', e); }

    // ── Fight statistics ─────────────────────────────────────────────────────
    try {
      const fs = p.fight_stats;
      const hasPhysique = p.height_inches || p.reach_inches;

      const hmSvg = (fs && fs.head_pct != null && fs.body_pct != null && fs.leg_pct != null)
        ? buildHeatmapSVG(fs.head_pct, fs.body_pct, fs.leg_pct, p.fighter_name)
        : '';

      const legendHtml = `
        <div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-top:0.75rem;font-size:0.75rem;">
          <span><span style="display:inline-block;width:10px;height:10px;background:#22c55e;border-radius:2px;margin-right:4px;vertical-align:middle;"></span>Low (&lt;20%)</span>
          <span><span style="display:inline-block;width:10px;height:10px;background:#f59e0b;border-radius:2px;margin-right:4px;vertical-align:middle;"></span>Medium (20-40%)</span>
          <span><span style="display:inline-block;width:10px;height:10px;background:#ef4444;border-radius:2px;margin-right:4px;vertical-align:middle;"></span>High (&gt;40%)</span>
        </div>`;

      let statsHtml = '<hr class="divider"><h2 style="margin-bottom:1rem;">Fight Statistics</h2>';

      // Physique silhouette — always show if data exists, regardless of CSV stats
      if (hasPhysique || hmSvg) {
        const cols = (hasPhysique && hmSvg) ? '1fr 1fr' : '1fr';
        statsHtml += `<div style="display:grid;grid-template-columns:${cols};gap:1rem;margin-bottom:1.25rem;">`;
        if (hasPhysique) {
          statsHtml += `
          <div class="card" style="display:flex;flex-direction:column;align-items:center;text-align:center;">
            <h3 style="margin-bottom:0.5rem;width:100%;text-align:left;">Physique</h3>
            ${buildSingleSilhouette(p.height_inches, p.reach_inches, p.weight_lbs)}
          </div>`;
        }
        if (hmSvg) {
          statsHtml += `
          <div class="card" style="display:flex;flex-direction:column;align-items:center;text-align:center;">
            <h3 style="margin-bottom:0.5rem;width:100%;text-align:left;">Strike zones</h3>
            <p style="font-size:0.78rem;color:var(--muted);margin-bottom:0.5rem;width:100%;text-align:left;">Where significant strikes land.</p>
            ${hmSvg}${legendHtml}
          </div>`;
        }
        statsHtml += `</div>`;
      }

      // Detailed stat bars — only when CSV aggregate stats are available
      if (fs) {
        statsHtml += `
          <div class="grid-2">
            <div class="card">
              <h3 style="margin-bottom:0.75rem;">Striking</h3>
              ${statBar('Sig. strikes / min', fs.sig_strikes_per_min, 10,  ORANGE, true)}
              ${statBar('Accuracy',           fs.strike_accuracy,      1,  ORANGE, false)}
              ${statBar('Defense',            fs.strike_defense,       1,  ORANGE, false)}
              ${statBar('Head %',             fs.head_pct,             1,  ORANGE, false)}
              ${statBar('Body %',             fs.body_pct,             1,  ORANGE, false)}
              ${statBar('Leg %',              fs.leg_pct,              1,  ORANGE, false)}
              <div style="margin-top:0.5rem;font-size:0.85rem;color:var(--muted);">
                KD / fight: <strong style="color:var(--text);">${fs.knockdowns_per_fight != null ? fs.knockdowns_per_fight.toFixed(2) : '—'}</strong>
              </div>
            </div>
            <div class="card">
              <h3 style="margin-bottom:0.75rem;">Grappling</h3>
              ${statBar('TD / min',     fs.td_per_min,  2, BLUE, true)}
              ${statBar('TD accuracy',  fs.td_accuracy, 1, BLUE, false)}
              ${statBar('TD defense',   fs.td_defense,  1, BLUE, false)}
              ${statBar('Control time', fs.ctrl_pct,    1, BLUE, false)}
              <div style="margin-top:0.5rem;font-size:0.85rem;color:var(--muted);">
                Sub att / fight: <strong style="color:var(--text);">${fs.sub_attempts_per_fight != null ? fs.sub_attempts_per_fight.toFixed(2) : '—'}</strong>
              </div>
            </div>
          </div>`;
      }

      if (hasPhysique || hmSvg || fs) {
        document.getElementById('stats-section').innerHTML = statsHtml;
      }
    } catch(e) { console.error('stats section:', e); }
  }

  // ── 5 closest rivals ──────────────────────────────────────────────────────
  function buildRivals5(fighterId, fighterElo, rankings) {
    return rankings
      .filter(r => r.fighter_id !== fighterId && r.elo != null)
      .map(r => ({ ...r, eloDiff: Math.abs(r.elo - fighterElo) }))
      .sort((a, b) => a.eloDiff - b.eloDiff)
      .slice(0, 5);
  }

  // ── Build expand row HTML ─────────────────────────────────────────────────
  function buildExpandHtml(h, fighterElo, kVarF, streakF, div, rivals5) {
    const bd = h.breakdown;
    let html = '<div class="expand-content">';

    if (bd && bd.k_effective != null) {
      const fmt    = (v, dec=3) => v != null ? (+v).toFixed(dec) : '—';
      const fmtPct = v => v != null ? (v*100).toFixed(1)+'%' : '—';
      const deltaCalc = (bd.elo_before != null && bd.elo_after != null)
        ? ((bd.elo_after - bd.elo_before) >= 0 ? '+' : '') + (bd.elo_after - bd.elo_before).toFixed(1)
        : '—';
      const deltaFinal = h.elo_change != null
        ? (h.elo_change >= 0 ? '+' : '') + h.elo_change.toFixed(1)
        : '—';

      html += `
        <div class="exp-section-title">Multiplier Breakdown</div>
        <div class="kd-grid">
          <div class="kd-item">K base: <strong>${fmt(bd.k_base, 1)}</strong></div>
          <div class="kd-item">K division: <strong>${fmt(bd.div_mult)}</strong></div>
          <div class="kd-item">K experience: <strong>${fmt(bd.k_var, 4)}</strong></div>
          <div class="kd-item">K streak: <strong>${fmt(bd.streak_mult)}</strong></div>
          <div class="kd-item">K effective: <strong>${fmt(bd.k_effective, 2)}</strong></div>
          <div class="kd-item">Expected prob.: <strong>${fmtPct(bd.expected_prob)}</strong></div>
          <div class="kd-item">Surprise: <strong>${bd.surprise != null ? (+bd.surprise).toFixed(4) : '—'}</strong></div>
          <div class="kd-item">Method mult.: <strong>${fmt(bd.method_weight)}</strong></div>
          <div class="kd-item">Title mult.: <strong>${h.is_title_fight ? 'Yes ×1.20' : 'No'}</strong></div>
          <div class="kd-item">Consec. mult.: <strong>${fmt(bd.consec_loss_mult)}</strong></div>
          <div class="kd-item">Calculated delta: <strong>${deltaCalc}</strong></div>
          <div class="kd-item">Final delta: <strong>${deltaFinal}</strong></div>
        </div>`;
    }

    // ── Per-fight stats ───────────────────────────────────────────────────────
    const fs = h.fight_stats;
    if (fs && (fs.strikes_landed != null || fs.td_landed != null)) {
      const acc  = (fs.strikes_landed != null && fs.strikes_attempted > 0)
        ? `${fs.strikes_landed}/${fs.strikes_attempted} (${(fs.strikes_landed/fs.strikes_attempted*100).toFixed(0)}%)`
        : fs.strikes_landed != null ? `${fs.strikes_landed}` : '—';
      const oAcc = (fs.opp_strikes_landed != null && fs.opp_strikes_attempted > 0)
        ? `${fs.opp_strikes_landed}/${fs.opp_strikes_attempted} (${(fs.opp_strikes_landed/fs.opp_strikes_attempted*100).toFixed(0)}%)`
        : fs.opp_strikes_landed != null ? `${fs.opp_strikes_landed}` : '—';
      const tdAcc = (fs.td_landed != null && fs.td_attempted > 0)
        ? `${fs.td_landed}/${fs.td_attempted} (${(fs.td_landed/fs.td_attempted*100).toFixed(0)}%)`
        : fs.td_landed != null ? `${fs.td_landed}` : '—';
      const ctrl = fs.control_seconds != null
        ? `${Math.floor(fs.control_seconds/60)}:${String(fs.control_seconds%60).padStart(2,'0')}`
        : '—';
      const headL = fs.head_landed != null
        ? `${fs.head_landed}${fs.head_attempted > 0 ? '/'+fs.head_attempted : ''}`
        : '—';
      const bodyL = fs.body_landed != null
        ? `${fs.body_landed}${fs.body_attempted > 0 ? '/'+fs.body_attempted : ''}`
        : '—';
      const legL  = fs.leg_landed != null
        ? `${fs.leg_landed}${fs.leg_attempted > 0 ? '/'+fs.leg_attempted : ''}`
        : '—';

      html += `
        <div class="exp-section-title" style="margin-top:0.75rem;">Fight Stats</div>
        <div class="kd-grid">
          <div class="kd-item">Strikes (L/A): <strong>${acc}</strong></div>
          <div class="kd-item">Opp. strikes: <strong>${oAcc}</strong></div>
          <div class="kd-item">Head: <strong>${headL}</strong></div>
          <div class="kd-item">Body: <strong>${bodyL}</strong></div>
          <div class="kd-item">Leg: <strong>${legL}</strong></div>
          <div class="kd-item">Knockdowns: <strong>${fs.knockdowns ?? '—'}</strong></div>
          <div class="kd-item">Opp. KDs: <strong>${fs.opp_knockdowns ?? '—'}</strong></div>
          <div class="kd-item">TD (L/A): <strong>${tdAcc}</strong></div>
          <div class="kd-item">Opp. TDs: <strong>${fs.opp_td_landed ?? '—'}</strong></div>
          <div class="kd-item">Sub att.: <strong>${fs.sub_attempts ?? '—'}</strong></div>
          <div class="kd-item">Ctrl. time: <strong>${ctrl}</strong></div>
        </div>`;
    }

    const ep = bd?.expected_prob;
    const result = h.result;
    const method = (h.method || '').toUpperCase();
    let insightText = '';
    if (ep != null && result) {
      if (result === 'Win') {
        if (ep > 0.60)      insightText = `Expected win — was favored with ${(ep*100).toFixed(0)}% probability.`;
        else if (ep < 0.40) insightText = `Upset — won as underdog (${(ep*100).toFixed(0)}% expected), earned much more ELO.`;
      } else if (result === 'Loss') {
        if (ep > 0.60 && (method.includes('KO') || method.includes('TKO')))
          insightText = `Worst case — lost as favorite (${(ep*100).toFixed(0)}%) by KO/TKO: triple penalty.`;
        else if (ep > 0.60)
          insightText = `Unexpected loss — was favored (${(ep*100).toFixed(0)}%), lost more ELO than expected.`;
        else if (ep < 0.40)
          insightText = `Expected loss — was the underdog (${(ep*100).toFixed(0)}%), lost minimal ELO.`;
      }
    }
    if (insightText) {
      html += `
        <div class="exp-section-title" style="margin-top:0.75rem;">Insight</div>
        <span class="insight-pill">${insightText}</span>`;
    }

    if (rivals5 && rivals5.length > 0) {
      const projRows = rivals5.map(rival => {
        const kVarR = varK(rival.fight_count || 10, div);
        const skR   = rival.streak || 0;
        const ko    = simProjection(fighterElo, rival.elo, kVarF, kVarR, streakF, skR, 'KO/TKO', 3);
        const dec   = simProjection(fighterElo, rival.elo, kVarF, kVarR, streakF, skR, 'DEC U',  3);
        return `<tr>
          <td>${rival.fighter_name || rival.fighter_id}</td>
          <td>${rival.elo.toFixed(0)}</td>
          <td class="g">${ko.winAfter} <span style="font-weight:400;font-size:0.7rem;color:var(--green);">(+${ko.dWin})</span></td>
          <td class="r">${ko.loseAfter} <span style="font-weight:400;font-size:0.7rem;color:var(--red);">(${ko.dLose})</span></td>
          <td class="g">${dec.winAfter} <span style="font-weight:400;font-size:0.7rem;color:var(--green);">(+${dec.dWin})</span></td>
          <td class="r">${dec.loseAfter} <span style="font-weight:400;font-size:0.7rem;color:var(--red);">(${dec.dLose})</span></td>
        </tr>`;
      }).join('');
      html += `
        <div class="exp-section-title" style="margin-top:0.75rem;">ELO projection vs nearby rivals</div>
        <div style="overflow-x:auto;">
          <table class="proj-table">
            <thead><tr>
              <th style="text-align:left;">Rival</th>
              <th>ELO</th><th>Win (KO)</th><th>Lose (KO)</th>
              <th>Win (DEC)</th><th>Lose (DEC)</th>
            </tr></thead>
            <tbody>${projRows}</tbody>
          </table>
        </div>`;
    }

    html += '</div>';
    return html;
  }

  function statBar(label, value, max, color, raw) {
    if (value === undefined || value === null) return '';
    const pct     = Math.min(Math.max(value / max, 0), 1) * 100;
    const display = raw ? value.toFixed(2) : (value * 100).toFixed(0) + '%';
    return `<div style="margin-bottom:0.55rem;">
      <div style="display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:3px;">
        <span style="color:var(--muted);">${label}</span>
        <span style="color:${color};font-weight:700;">${display}</span>
      </div>
      <div style="background:var(--surface2);border-radius:3px;height:5px;overflow:hidden;">
        <div style="background:${color};width:${pct.toFixed(1)}%;height:5px;border-radius:3px;"></div>
      </div>
    </div>`;
  }

  divSel.addEventListener('change', loadDiv);
  fighterSel.addEventListener('change', loadFighter);
  retiredToggle.addEventListener('change', loadDiv);
  await loadDiv();
});
</script>
</body>
</html>
